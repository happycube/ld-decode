name: Build and Test

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  release:
    types: [created, published]

jobs:
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Run functional tests (Nix)
        timeout-minutes: 60
        run: |
          nix develop .#default -c bash -lc '
            mkdir -p build/testout
            cd build
            cmake -DCMAKE_BUILD_TYPE=Release ..
            ctest --output-on-failure -V
          '

  build-linux-decode:
    name: Build Linux decode binaries
    needs: functional-tests
    uses: ./.github/workflows/build_linux_decode.yml
    secrets: inherit

  build-windows-decode:
    name: Build Windows decode binaries
    needs: functional-tests
    uses: ./.github/workflows/build_windows_decode.yml
    secrets: inherit

  build-macos-decode:
    name: Build macOS decode binaries
    needs: functional-tests
    uses: ./.github/workflows/build_macos_decode.yml
    secrets: inherit
