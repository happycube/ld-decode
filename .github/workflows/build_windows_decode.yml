name: "Build Windows decode"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string

jobs:
  build-decode:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: windows-2022
            python_arch: x64
          - arch: arm64
            os: windows-11-arm
            # numba/llvmlite currently do not publish win_arm64 wheels.
            # Use x64 Python on ARM runners so binary wheels can be installed.
            python_arch: x64
    name: Build decode (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    env:
        SETUPTOOLS_RUST_CARGO_PROFILE: release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python_arch }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust x64 target on ARM runner
        if: matrix.arch == 'arm64' && matrix.python_arch == 'x64'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Ensure DIA SDK path compatibility for arm64
        if: matrix.arch == 'arm64' && matrix.python_arch == 'arm64'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }

          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            $vsInstallPath = & $vswhere -latest -products * -property installationPath
          }
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw "Unable to locate Visual Studio installation path."
          }

          $sourceDiaSdk = Join-Path $vsInstallPath "DIA SDK"
          if (-not (Test-Path $sourceDiaSdk)) {
            throw "DIA SDK directory not found at $sourceDiaSdk"
          }

          $communityRoot = "C:\Program Files\Microsoft Visual Studio\2022\Community"
          $communityDiaSdk = Join-Path $communityRoot "DIA SDK"
          if (-not (Test-Path $communityDiaSdk)) {
            New-Item -ItemType Directory -Path $communityRoot -Force | Out-Null
            Copy-Item -Path $sourceDiaSdk -Destination $communityDiaSdk -Recurse -Force
          }

          $arm64DiaLib = Join-Path $communityDiaSdk "lib\arm64\diaguids.lib"
          if (-not (Test-Path $arm64DiaLib)) {
            throw "Expected DIA SDK library not found at $arm64DiaLib"
          }

      - name: Preinstall numba and llvmlite wheels on ARM runner
        if: matrix.arch == 'arm64'
        run: |
          python -m pip install --upgrade pip "setuptools<82" wheel
          python -m pip install --only-binary=:all: "llvmlite==0.47.0" "numba==0.65.1"

      - name: Configure PyO3 cross-build environment on ARM runner
        if: matrix.arch == 'arm64' && matrix.python_arch == 'x64'
        shell: pwsh
        run: |
          $pythonBase = python -c "import sys; print(sys.base_prefix)"
          $pythonVersion = python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          $pythonLibDir = Join-Path $pythonBase "libs"
          if (-not (Test-Path $pythonLibDir)) {
            throw "Python libs directory not found at $pythonLibDir"
          }

          "CARGO_BUILD_TARGET=x86_64-pc-windows-msvc" >> $env:GITHUB_ENV
          "PYO3_CROSS=1" >> $env:GITHUB_ENV
          "PYO3_CROSS_PYTHON_IMPLEMENTATION=CPython" >> $env:GITHUB_ENV
          "PYO3_CROSS_PYTHON_VERSION=$pythonVersion" >> $env:GITHUB_ENV
          "PYO3_CROSS_LIB_DIR=$pythonLibDir" >> $env:GITHUB_ENV

      - name: Build Python module
        run: |
          python -m pip install --upgrade pip "setuptools<82" wheel
          pip install pyinstaller pyinstaller-versionfile
          pip install -e ".[hifi_gui_qt6]"

      - name: Build Windows binary
        run: |
          python .\scripts\ci\build-windows-decode-bin.py

      - name: Smoke test binary startup
        shell: pwsh
        run: |
          python -c "import subprocess,sys; subprocess.run([r'.\\dist\\decode.exe','ld','--version'], timeout=120, check=True)"
      - name: Smoke test 300-frame VHS decode (crash regression)
        shell: pwsh
        timeout-minutes: 15
        run: |
          $sampleUrl = "https://drive.google.com/file/d/1zJXh1c9KftkFaIsa7OsSEa9XHs6EMBSZ/view?usp=drive_link"
          $sampleDir = Join-Path $env:RUNNER_TEMP "windows-vhs-crash-sample"
          New-Item -ItemType Directory -Path $sampleDir -Force | Out-Null

          python -m pip install --upgrade gdown
          python -m gdown --fuzzy $sampleUrl --output $sampleDir

          $sampleFile = Get-ChildItem -Path $sampleDir -File | Sort-Object Length -Descending | Select-Object -First 1
          if ($null -eq $sampleFile) {
            throw "Failed to download the Windows regression sample."
          }
          if ($sampleFile.Length -lt 1MB) {
            throw "Downloaded regression sample is unexpectedly small: $($sampleFile.FullName)"
          }

          $outputBase = Join-Path $env:RUNNER_TEMP "windows_300_frame_smoke"
          $logPath = Join-Path $env:RUNNER_TEMP "windows_300_frame_smoke.log"

          $decodeArgs = @(
            "vhs",
            "--overwrite",
            "--length", "300",
            "--threads", "4",
            $sampleFile.FullName,
            $outputBase
          )

          & .\dist\decode.exe @decodeArgs *> $logPath
          $decodeExitCode = $LASTEXITCODE

          Get-Content $logPath

          if ($decodeExitCode -ne 0) {
            throw "decode.exe exited with code $decodeExitCode"
          }

          $logText = Get-Content $logPath -Raw
          $crashPatterns = @(
            "Exception in thread",
            "Traceback (most recent call last)",
            "ArrayMemoryError",
            "MemoryError"
          )
          foreach ($pattern in $crashPatterns) {
            if ($logText -match [regex]::Escape($pattern)) {
              throw "Detected crash signature in decode log: $pattern"
            }
          }

          if (-not (Test-Path ($outputBase + ".tbc.json"))) {
            throw "Expected decode output metadata was not created: $($outputBase + '.tbc.json')"
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: decode_windows_${{ matrix.arch }}
          path: dist/decode.exe
          if-no-files-found: error
