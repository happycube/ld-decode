name: "Push to TestPyPI"

on:
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]

    env:
      CIBW_SKIP: "cp38-* cp39-* cp310-* pp*"
      CIBW_ARCHS_LINUX: "x86_64"
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_ARCHS_MACOS: "x86_64 arm64 universal2"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.3

      - uses: actions/upload-artifact@v7
        with:
          name: vhs-decode-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  create-sdist:
    name: Create source distribution
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create the sdist
        run: |
          pipx run build --sdist

      - name: Store the sdist
        uses: actions/upload-artifact@v7
        with:
          name: vhs-decode-sdist
          path: dist/*.tar.gz

  publish-to-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-22.04

    needs:
      - build-wheels
      - create-sdist

    environment:
      name: testpypi
      url: https://test.pypi.org/p/vhs-decode

    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vhs-decode-*
          path: dist
          merge-multiple: true

      - name: Publish packages to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
