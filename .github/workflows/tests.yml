name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test_python_unit:
    name: test_python_unit
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2

    - uses: dtolnay/rust-toolchain@stable

    - name: Install package with test dependencies
      timeout-minutes: 10
      run: pip install ".[test]"

    - name: Verify Cython extensions compiled
      run: cd /tmp && python -c "import vhsdecode.linear_filter; import vhsdecode.sync; import vhsdecode.hilbert; print('Cython OK')"

    - name: Run unit tests
      timeout-minutes: 5
      # Run from /tmp so Python imports the installed package (with compiled
      # Cython/Rust extensions) rather than the source tree.
      run: cd /tmp && python -m pytest --rootdir=$GITHUB_WORKSPACE $GITHUB_WORKSPACE/tests/unit -v

  test_core_build:
    name: test_core_build (Qt${{ matrix.qt }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        qt: [5, 6]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: actions/checkout@v4
      with:
        repository: happycube/ld-decode-testdata
        path: testdata

    - name: Install dependencies (Qt5)
      if: matrix.qt == 5
      timeout-minutes: 10
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git cmake make python3-setuptools python3-numpy python3-scipy python3-matplotlib libqt5opengl5-dev libqt5svg5-dev libqwt-qt5-dev libfftw3-dev python3-numba libavformat-dev libavcodec-dev libavutil-dev ffmpeg

    - name: Install dependencies (Qt6)
      if: matrix.qt == 6
      timeout-minutes: 10
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git cmake make python3-distutils python3-numpy python3-scipy python3-matplotlib qt6-base-dev libgl-dev libfftw3-dev python3-numba libavformat-dev libavcodec-dev libavutil-dev ffmpeg

    - name: Configure
      timeout-minutes: 5
      run: |
        mkdir obj
        ln -s ../testdata obj/testdata
        if [ "${{ matrix.qt }}" = "5" ]; then
          cmake -S . -B obj -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_QT_VERSION=5
        else
          cmake -S . -B obj -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_QT_VERSION=6 -DUSE_QWT=OFF
        fi

    - name: Build
      timeout-minutes: 15
      run: cmake --build obj --verbose

    - name: Install
      timeout-minutes: 5
      run: cmake --install obj --prefix /tmp/staging && ls -lR /tmp/staging

    - name: Run tests
      timeout-minutes: 10
      run: ctest --test-dir obj --output-on-failure

  test_real_data:
    name: test_real_data
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: actions/checkout@v4
      with:
        repository: happycube/ld-decode-testdata
        path: testdata

    - name: Install dependencies
      timeout-minutes: 10
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git cmake make python3-setuptools python3-numpy python3-scipy python3-matplotlib qt6-base-dev libgl-dev libfftw3-dev python3-numba libavformat-dev libavcodec-dev libavutil-dev ffmpeg

    - name: Build core (Qt6)
      timeout-minutes: 15
      run: |
        cmake -S . -B obj -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_QT_VERSION=6 -DUSE_QWT=OFF
        cmake --build obj --verbose

    - name: Decoder smoke test on real data
      timeout-minutes: 15
      run: |
        mkdir -p test_out
        python3 decode.py ld testdata/ve-smpteres.ldf test_out/ntsc_real --NTSC --threads 2 --length 1 --disable_analog_audio
        test -s test_out/ntsc_real.tbc
        test -s test_out/ntsc_real.tbc.json
        python3 decode.py ld testdata/pal/ggv-mb-1khz.ldf test_out/pal_real --PAL --threads 2 --length 1 --disable_analog_audio
        test -s test_out/pal_real.tbc
        test -s test_out/pal_real.tbc.json
