name: "Build macOS decode"

on:
  workflow_dispatch:

jobs:
  build-decode:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
        include:
          - os: macos-latest
            arch: arm64
            python: "3.12"
          - os: macos-15-intel
            arch: x86_64
            # Use a Python version with reliable wheels for llvmlite/numba on Intel macOS
            python: "3.11"

    name: Build vhs-decode (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Upgrade pip tooling
        run: python3 -m pip install --upgrade pip setuptools wheel

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install create-dmg libsndfile

      - name: Install LLVM (Intel only)
        if: matrix.arch == 'x86_64'
        run: brew install llvm@20

      - name: Build Python module
        shell: bash
        env:
          SETUPTOOLS_RUST_CARGO_PROFILE: release
        run: |
          set -euxo pipefail

          # llvmlite may fall back to source builds on Intel macOS; ensure it can find Homebrew LLVM
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            export LLVM_CONFIG="$(brew --prefix llvm@20)/bin/llvm-config"
            export CMAKE_PREFIX_PATH="$(brew --prefix llvm@20)"
          fi

          python3 -m pip install -r ./requirements.txt
          python3 -m pip install pyinstaller
          python3 -m pip install -e ".[hifi_gui_qt6,hifi_gnuradio]"

      - name: Build binary
        run: |
          python3 scripts/ci/build-macos-decode-bin.py

      - name: Build DMG file
        run: >-
          create-dmg
          --volname "vhs-decode"
          --volicon "assets/icons/vhs-decode.icns"
          --window-pos 200 128
          --window-size 600 300
          --icon-size 100
          --icon "vhs-decode.app" 172 120
          --app-drop-link 425 128
          --skip-jenkins
          --hide-extension "vhs-decode.app"
          "vhs-decode.dmg"
          "dist/vhs-decode.app"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhs-decode_macos_${{ matrix.arch }}
          path: vhs-decode.dmg
          if-no-files-found: error
